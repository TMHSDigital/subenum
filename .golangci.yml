version: "2"

run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - gosec
    - gocritic
    - misspell
    - unconvert
  settings:
    gosec:
      excludes:
        # G304: File path provided as taint input — expected for a wordlist tool
        - G304
    errcheck:
      # These write to stdout/files in hot paths; errors are intentionally ignored
      exclude-functions:
        - fmt.Printf
        - fmt.Fprintln
        - fmt.Fprintf
        - fmt.Println
  exclusions:
    rules:
      # Test files are allowed to use gosec-flagged patterns
      - path: _test\.go
        linters:
          - gosec

formatters:
  enable:
    - gofmt
