run:
  timeout: 5m
  go: "1.22"

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - gofmt
    - unused
    - gosec
    - gocritic
    - misspell
    - unconvert

linters-settings:
  gosec:
    excludes:
      # G304: File path provided as taint input — expected for a wordlist tool
      - G304
  errcheck:
    # These write to stdout/files in hot paths; errors are intentionally ignored
    exclude-functions:
      - fmt.Printf
      - fmt.Fprintln
      - fmt.Fprintf
      - fmt.Println

issues:
  exclude-rules:
    # Test files are allowed to use gosec-flagged patterns
    - path: _test\.go
      linters:
        - gosec
