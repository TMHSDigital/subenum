<svg width="620" height="110" viewBox="0 0 620 110" xmlns="http://www.w3.org/2000/svg">
  <!-- terminal card background -->
  <rect width="620" height="110" rx="8" fill="#0d1117"/>

  <!-- $ prompt -->
  <text x="28" y="62"
        font-family="'Courier New', Courier, monospace"
        font-size="42" font-weight="700"
        fill="#3fb950">$</text>

  <!-- "sub" — white -->
  <text x="62" y="62"
        font-family="'Courier New', Courier, monospace"
        font-size="42" font-weight="700"
        fill="#e6edf3">sub</text>

  <!-- "enum" — blue, immediately after sub (42px font, ~25.2px per char × 3 = ~75.6px + 62 = ~138) -->
  <text x="138" y="62"
        font-family="'Courier New', Courier, monospace"
        font-size="42" font-weight="700"
        fill="#58a6ff">enum</text>

  <!-- cursor — thin vertical bar right after "enum" (~25.2 × 4 = ~100.8px + 138 = ~239) -->
  <text x="239" y="62"
        font-family="'Courier New', Courier, monospace"
        font-size="42" font-weight="700"
        fill="#58a6ff">▌</text>

  <!-- tagline -->
  <text x="28" y="90"
        font-family="'Courier New', Courier, monospace"
        font-size="12"
        fill="#8b949e"
        letter-spacing="0.5">fast concurrent subdomain enumeration // written in Go</text>
</svg>
