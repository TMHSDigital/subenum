name: Go

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'

    - name: Cache Go build artifacts
      uses: actions/cache@v5
      with:
        path: |
          ~/.cache/go-build
          ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.mod') }}
        restore-keys: |
          ${{ runner.os }}-go-

    - name: Verify dependencies
      run: go mod verify

    - name: Build
      run: go build -v -buildvcs=false ./...

    - name: Test
      run: go test -v -race ./...

    - name: Run golangci-lint
      uses: golangci/golangci-lint-action@v9
      with:
        version: latest

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            artifact_name: subenum
            asset_name: subenum-linux-amd64
          - os: windows-latest
            goos: windows
            goarch: amd64
            artifact_name: subenum.exe
            asset_name: subenum-windows-amd64.exe
          - os: macos-latest
            goos: darwin
            goarch: arm64
            artifact_name: subenum
            asset_name: subenum-macos-arm64
          - os: ubuntu-latest
            goos: darwin
            goarch: amd64
            artifact_name: subenum
            asset_name: subenum-macos-amd64

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'

    - name: Cache Go build artifacts
      uses: actions/cache@v5
      with:
        path: |
          ~/.cache/go-build
          ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.mod') }}
        restore-keys: |
          ${{ runner.os }}-go-

    - name: Build
      env:
        GOOS: ${{ matrix.goos }}
        GOARCH: ${{ matrix.goarch }}
      run: go build -v -buildvcs=false -o ${{ matrix.artifact_name }}

    - name: Rename for release
      shell: bash
      run: |
        if [ "${{ matrix.artifact_name }}" != "${{ matrix.asset_name }}" ]; then
          cp ${{ matrix.artifact_name }} ${{ matrix.asset_name }}
        fi

    - name: Upload binaries to release
      uses: softprops/action-gh-release@v2
      with:
        files: ${{ matrix.asset_name }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
